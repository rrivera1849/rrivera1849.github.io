{{ define "main" }}
<section class="blog-section">
  <h1>Blog</h1>
  {{ .Content }}
  <ul class="blog-list">
    {{ range .Pages.ByDate.Reverse }}
    <li class="blog-item">
      <a href="{{ .RelPermalink }}">{{ .Title }}</a>
      <span class="blog-date">{{ .Date.Format "January 2, 2006" }}</span>
      {{ with .Params.description }}<p class="blog-description">{{ . }}</p>{{ end }}
    </li>
    {{ end }}
  </ul>
</section>
{{ end }}
